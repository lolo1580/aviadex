services:
  aviadex:
    image: ${AVIADEX_IMAGE:-harbor.kellerflix.org/aviadex/prod:v1.0.1}
    container_name: aviadex
    restart: unless-stopped
    ports:
      - "${AVIADEX_HTTP_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
